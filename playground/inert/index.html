<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inert Property Test</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #007aff;
            color: #fff;
            cursor: pointer;
        }

        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.2s;
        }

        .menu[inert] {
            opacity: 0;
        }

        .menu button {
            background: #fff;
            color: #000;
            min-width: 200px;
        }

        .log {
            margin-top: 24px;
            padding: 12px;
            background: #f3f3f3;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            min-height: 60px;
        }

        .info {
            margin-top: 12px;
            padding: 12px;
            background: #fff7e6;
            border: 1px solid #ffd68a;
            border-radius: 6px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h1>Inert Property Test</h1>

    <div class="field">
        <label for="name">Text input (should be clickable when menu is hidden):</label>
        <input id="name" type="text" placeholder="Tap me">
    </div>

    <div class="field">
        <button id="open">Open Menu</button>
    </div>

    <div class="info">
        <div><strong>'inert' in HTMLElement.prototype:</strong> <span id="support"></span></div>
        <div><strong>UA:</strong> <span id="ua"></span></div>
    </div>

    <div class="log" id="log">Tap the input to verify it works while menu is hidden.</div>

    <div class="menu" id="menu" inert>
        <div>Fullscreen Menu</div>
        <button id="close">Close Menu</button>
    </div>

    <script>
        var menu = document.getElementById('menu');
        var input = document.getElementById('name');
        var openBtn = document.getElementById('open');
        var closeBtn = document.getElementById('close');
        var log = document.getElementById('log');
        var support = document.getElementById('support');
        var ua = document.getElementById('ua');

        support.textContent = ('inert' in HTMLElement.prototype) ? 'yes' : 'no';
        ua.textContent = navigator.userAgent;

        function write(msg) {
            var time = new Date().toLocaleTimeString();
            log.textContent = '[' + time + '] ' + msg + '\n' + log.textContent;
        }

        openBtn.addEventListener('click', function () {
            menu.inert = false;
            write('menu opened (inert=false)');
        });

        closeBtn.addEventListener('click', function () {
            menu.inert = true;
            write('menu closed (inert=true)');
        });

        input.addEventListener('focus', function () {
            write('input focused');
        });

        input.addEventListener('click', function () {
            write('input clicked');
        });
    </script>
</body>
</html>
